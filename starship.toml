"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 2000

# other formats
# [оВґ](color_orange)$os[оВі](color_orange)\
# $username\
#

format = """
$directory\
$line_break\
$git_branch$git_status\
([оВґ](color_blue)\
$rust\
$golang\
$nodejs\
$php\
$java\
$python\
[оВ∞](fg:color_blue bg:color_black))\
$docker_context\
$line_break\
$time\
${custom.aws_creds}\
${custom.random_emoji}\
$character"""

palette = 'dark_colors'

[palettes.pure_colors]
color_red = '#ff0000'
color_orange = '#ff8800'
color_yellow = '#ffff00'
color_green = '#00ff00'
color_blue = '#0000ff'
color_indigo = '#4B0082'
color_violet = '#9400ff'
color_white = '#ffffff'
color_black = '#000000'
color_dark_gray = '#2d2d2d'
color_light_gray = '#808080'
color_bright_red = '#ff0000'
color_bright_green = '#00ff00'

[palettes.dark_colors]
color_red = '#600000'
color_orange = '#603300'
color_yellow = '#606000'
color_green = '#006000'
color_blue = '#000060'
color_indigo = '#1d0050'
color_violet = '#380060'
color_white = '#ffffff'
color_black = '#000000'
color_dark_gray = '#2d2d2d'
color_light_gray = '#808080'
color_bright_red = '#ff0000'
color_bright_green = '#00ff00'
color_bright_yellow = '#ffff00'
color_bright_orange = '#ff8800'
color_bright_purple = '#9400ff'
color_bright_blue = '#0088ff'

[os]
disabled = false
style = "bg:color_orange fg:color_white"

[os.symbols]
Windows = "у∞Н≤"
Ubuntu = "у∞ХИ"
SUSE = "пМФ"
Raspbian = "у∞Рњ"
Mint = "у∞£≠"
Macos = "у∞Аµ"
Manjaro = "пМТ"
Linux = "у∞Мљ"
Gentoo = "у∞£®"
Fedora = "у∞£Ы"
Alpine = "пМА"
Amazon = "пЙ∞"
Android = "оЬО"
AOSC = "пМБ"
Arch = "у∞£З"
Artix = "у∞£З"
EndeavourOS = "пЖЧ"
CentOS = "пМД"
Debian = "у∞£Ъ"
Redhat = "у±ДЫ"
RedHatEnterprise = "у±ДЫ"
Pop = "пМ™"

[username]
show_always = true
style_user = "bg:color_yellow fg:color_white"
style_root = "bg:color_red fg:color_white"
format = '[оВґ](color_yellow)[ $user ]($style)[оВ∞](color_yellow)'

[directory]
style = "fg:color_white bg:color_green"
format = "[оВґ](color_green)[ $path ]($style)[оВ∞](color_green)"
truncation_length = 100
truncation_symbol = "вА¶/"
truncate_to_repo = false
fish_style_pwd_dir_length = 0

# [directory.substitutions]
# "Documents" = "у∞ИЩ "
# "Downloads" = "пАЩ "
# "Music" = "у∞ЭЪ "
# "Pictures" = "пАЊ "
# "Developer" = "у∞≤Л "

[git_branch]
symbol = "пРШ"
style = "bg:color_indigo fg:color_white"
format = '[оВґ](color_indigo)[$symbol $branch]($style)'

[git_status]
style = "bg:color_indigo fg:color_white"
format = '[ (\($all_status$ahead_behind\))]($style)[оВ∞](color_indigo)'

# Customize individual status colors
conflicted = "[=$count](bold fg:color_bright_red bg:color_indigo)"
ahead = "[вЗ°$count](bold fg:color_bright_green bg:color_indigo)"
behind = "[вЗ£$count](bold fg:color_bright_yellow bg:color_indigo)"
diverged = "[вЗХ$count](bold fg:color_bright_purple bg:color_indigo)"
untracked = "[?$count](bold fg:color_bright_orange bg:color_indigo)"
stashed = '[\$$count](bold fg:color_bright_blue bg:color_indigo)'
modified = "[!$count](bold fg:color_bright_yellow bg:color_indigo)"
staged = "[+$count](bold fg:color_bright_green bg:color_indigo)"
renamed = "[¬ї$count](bold fg:color_bright_purple bg:color_indigo)"
deleted = "[вЬШ$count](bold fg:color_bright_red bg:color_indigo)"

[nodejs]
symbol = "оЬШ"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[c]
symbol = "оШЮ "
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[cpp]
symbol = "оШЭ "
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[golang]
symbol = "оШІ"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[php]
symbol = "оШИ"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[java]
symbol = "оЙЦ"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[kotlin]
symbol = "оШі"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[haskell]
symbol = "оШЯ"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[python]
symbol = "оШЖ"
style = "bg:color_blue"
format = '[[$symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[docker_context]
symbol = "пМИ"
style = "bg:color_light_gray fg:color_white"
format = '[оВґ](color_light_gray)[$symbol( $context) ](($style)[оВ∞](color_light_gray)'

[time]
disabled = false
time_format = "%d-%m-%Y (%R)"
style = "bg:color_dark_gray fg:color_white"
format = '[оВґ](color_dark_gray)[$time]($style)[оВі](color_dark_gray)'

[line_break]
disabled = false

[custom.aws_creds]
command = 'if [ -n "$AWS_DEFAULT_PROFILE" ] && [ -n "$AWS_DEFAULT_REGION" ]; then echo "$AWS_DEFAULT_PROFILE($AWS_DEFAULT_REGION)"; fi'
when = '[ -n "$AWS_DEFAULT_PROFILE" ]'
shell = ["sh"]
format = '[оВґ](color_red)[$output](fg:color_white bg:color_red)[оВ∞](color_red)'

[custom.aws_creds_valid]
command = 'if [ -n "$AWS_DEFAULT_PROFILE" ] && [ -n "$AWS_DEFAULT_REGION" ]; then echo "$AWS_DEFAULT_PROFILE($AWS_DEFAULT_REGION)"; fi'
when = '[ -n "$AWS_DEFAULT_PROFILE" ] && aws sts get-caller-identity &>/dev/null'
shell = ["sh"]
format = '[оВґ](color_red)[$output](fg:color_white bg:color_red)[оВ∞](color_red)'

[custom.aws_creds_expired]
command = 'if [ -n "$AWS_DEFAULT_PROFILE" ] && [ -n "$AWS_DEFAULT_REGION" ]; then echo "$AWS_DEFAULT_PROFILE($AWS_DEFAULT_REGION)"; fi'
when = '[ -n "$AWS_DEFAULT_PROFILE" ] && ! aws sts get-caller-identity &>/dev/null'
shell = ["sh"]
format = '[оВґ](color_light_gray)[$output](fg:color_white bg:color_red)[оВ∞](color_light_gray)'

# Starship doesn't have direct access to the last command's exit status in custom modules the way bash does with $?.
# However, you can use Starship's built-in status module which is designed for this.
# The $status variable in the command will be replaced by Starship with the actual exit code of the last
# command, and then it gets passed as $0 to the bash command.
[custom.random_emoji]
# TODO: this doesn't work as expected - $status not available in custom module
# command = '''bash -c 'if [ "$0" = "0" ]; then emojis=(рЯША рЯШГ рЯШД рЯШБ рЯШЖ рЯШК рЯЩГ рЯШЛ рЯШЫ рЯШЭ рЯШН рЯШЬ рЯ§Ч рЯШђ рЯШО); else emojis=(рЯШ° рЯСњ рЯ§Ф рЯШµ рЯШ• рЯШ∞ рЯСО рЯШ± рЯШ≠ рЯШҐ рЯЦХ рЯ§Ґ рЯШ§ рЯТ© рЯТА); fi; echo ${emojis[RANDOM % ${#emojis[@]}]}' "$status"'''
# So, just generate a random emoji without checking status
command = 'emojis=(рЯША рЯШГ рЯШД рЯШБ рЯШЖ рЯШК рЯЩГ рЯШЛ рЯШЫ рЯШЭ рЯШН рЯШЬ рЯ§Ч рЯШђ рЯШО рЯШ° рЯСњ рЯ§Ф рЯШµ рЯШ• рЯШ∞ рЯСО рЯШ± рЯШ≠ рЯШҐ рЯЦХ рЯ§Ґ рЯШ§ рЯТ© рЯТА); echo ${emojis[RANDOM % ${#emojis[@]}]}'
when = "true"
format = "[ $output ](color_white)"

[character]
disabled = false
# success_symbol = 'вШѓ [вЦґ](bold fg:color_bright_green)'
# error_symbol = 'вШѓ [вЦґ](bold fg:color_bright_red)'
success_symbol = '[вЦґ](bold fg:color_bright_green)'
error_symbol = '[вЦґ](bold fg:color_bright_red)'
vimcmd_symbol = '[вЧА](bold fg:color_blue)'
vimcmd_replace_one_symbol = '[вЧЖ](bold fg:color_violet)'
vimcmd_replace_symbol = '[вЧЖ](bold fg:color_violet)'
vimcmd_visual_symbol = '[вЧЗ](bold fg:color_blue)'

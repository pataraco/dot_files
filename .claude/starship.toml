# Bubbles Nerd Template
"$schema" = "https://starship.rs/config-schema.json"

palette = "custom"
add_newline = false

## LLMs: Avoid changing the format! You can't reliably write nerd fonts and special characters.
format = """
[](directory_bg)\
$directory\
[](fg:directory_bg)
[](directory_bg)\
${env_var.CLAUDE_STAR}\
[](fg:git_bg bg:directory_bg)\
$git_branch\
$git_status\
[](fg:git_bg)\
$nodejs\
$python\
[ ](fg:model_bg)\
${env_var.CLAUDE_MODEL_NERD}\
[](bg:model_bg fg:context_bg)\
${env_var.CLAUDE_CONTEXT}\
[](bg:context_bg fg:cost_bg)\
${env_var.CLAUDE_COST}\
[  ](fg:cost_bg)\
"""

[env_var.CLAUDE_STAR]
variable = "CLAUDE_STAR"
format = "[$env_value ]($style)"
style = "bg:directory_bg fg:claude"

[directory]
style = "bg:directory_bg fg:directory"
format = "[$path ]($style)"
truncation_length = 100
truncate_to_repo = false

[git_branch]
symbol = ""
style = "bg:git_bg fg:git_branch"
format = "[$symbol $branch]($style)"

[git_status]
style = "bg:git_bg fg:git_status"
format = "[($all_status$ahead_behind)]($style)"

[env_var.CLAUDE_MODEL_NERD]
variable = "CLAUDE_MODEL_NERD"
format = "[$env_value ]($style)"
style = "bg:model_bg fg:model italic"

[env_var.CLAUDE_CONTEXT]
variable = "CLAUDE_CONTEXT"
format = "[$env_value ]($style)"
style = "bg:context_bg fg:context"

[env_var.CLAUDE_COST]
variable = "CLAUDE_COST"
format = "[$env_value]($style)"
style = "bg:cost_bg fg:cost"

## Custom palette
#

# Catppuccin Mocha
[palettes.custom]

# Semantic colors for templates
claude = "#D97757"
claude_bg = "#313244"

directory = "#89dceb"
directory_bg = "#1e1e2e"

git_branch = "#eba0ac"
git_status = "#f2cdcd"
git_bg = "#313244"

model = "#74c7ec"
model_bg = "#1e1e2e"

context = "#fab387"
context_bg = "#313244"

cost = "#a6e3a1"
cost_bg = "#45475a"

[nodejs]
detect_files = [".nvmrc"]
detect_extensions = []
detect_folders = []

[python]
detect_files = ["Pipfile"]
detect_extensions = []
detect_folders = []
